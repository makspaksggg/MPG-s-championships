<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>АДМИН-ПАНЕЛЬ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="grid-bg"></div>
<header><h1 class="neon-pink">⚡ АДМИН-ПАНЕЛЬ ⚡</h1></header>

<div class="retro-box" id="login-section">
  <h2>Вход для администратора</h2>
  <p>Используйте свой admin-аккаунт (войдите на главной и перейдите сюда)</p>
  <button onclick="window.location.href='index.html'">НА ГЛАВНУЮ</button>
</div>

<div id="admin-controls" class="hidden">
  <div class="retro-box">
    <h2>Регистрация</h2>
    <button onclick="toggleReg()">ОТКРЫТЬ/ЗАКРЫТЬ</button>
    <span id="reg-status"></span>
  </div>
  <div class="retro-box">
    <h2>Установить старт</h2>
    <input type="datetime-local" id="start-date">
    <button onclick="setStart()">ЗАДАТЬ</button>
  </div>
  <div class="retro-box">
    <h2>Заявки</h2>
    <div id="requests-list">Загрузка...</div>
  </div>
  <div class="retro-box">
    <h2>Добавить новость</h2>
    <input placeholder="Заголовок" id="news-title">
    <textarea placeholder="Текст" id="news-content"></textarea>
    <input placeholder="URL картинки" id="news-img">
    <input placeholder="URL видео" id="news-vid">
    <button onclick="addNews()">ОПУБЛИКОВАТЬ</button>
  </div>
  <div class="retro-box">
    <h2>Уведомление участникам</h2>
    <textarea id="notify-msg" placeholder="Сообщение"></textarea>
    <button onclick="sendNotification()">РАЗОСЛАТЬ</button>
  </div>
</div>

<script src="api.js"></script>
<script>
  const API = getApi();
  let adminToken = '';

  // Проверяем, залогинен ли админ (читаем localStorage)
  const userData = localStorage.getItem('user');
  if (userData) {
    const user = JSON.parse(userData);
    if (user.role === 'admin') {
      adminToken = user.token;
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('admin-controls').classList.remove('hidden');
      refreshAll();
    } else {
      alert('Вы не администратор');
      window.location.href = 'index.html';
    }
  } else {
    alert('Сначала войдите как администратор на главной странице');
    window.location.href = 'index.html';
  }

  async function refreshAll() {
    await refreshConfig();
    await loadRequests();
  }

  async function refreshConfig() {
    const res = await API.call('countdown');
    document.getElementById('reg-status').innerText = res.registration_open ? 'ОТКРЫТА' : 'ЗАКРЫТА';
  }

  async function toggleReg() {
    await API.call('admin_toggle_reg', { token: adminToken });
    refreshConfig();
  }

  async function setStart() {
    const val = document.getElementById('start-date').value;
    if (!val) return;
    await API.call('admin_set_start', { token: adminToken, start_time: val });
    alert('Дата установлена');
  }

  async function loadRequests() {
    // Пока нет готового API для списка заявок, добавлю упрощённый
    // Можно добавить action 'admin_get_requests' в Apps Script
    // Сейчас покажу заглушку
    document.getElementById('requests-list').innerHTML = 'Функция в разработке';
  }

  async function addNews() {
    await API.call('admin_add_news', {
      token: adminToken,
      title: document.getElementById('news-title').value,
      content: document.getElementById('news-content').value,
      image_url: document.getElementById('news-img').value,
      video_url: document.getElementById('news-vid').value
    });
    alert('Новость добавлена');
  }

  async function sendNotification() {
    const msg = document.getElementById('notify-msg').value;
    if (!msg) return;
    await API.call('admin_send_notification', { token: adminToken, message: msg });
    alert('Уведомления разосланы');
  }
</script>
</body>
</html>
