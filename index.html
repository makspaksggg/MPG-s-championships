<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>COSMIC CHAMPIONSHIP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="grid-bg"></div>
<header>
  <h1 class="neon-pink">⚡ CHAMPIONSHIP ⚡</h1>
  <p class="neon-blue">--- SYNTHWAVE ARENA ---</p>
</header>

<!-- Таймер -->
<div class="retro-box">
  <h2>🚀 До старта:</h2>
  <div id="timer">--:--:--</div>
</div>

<!-- Форма входа / регистрации -->
<div class="retro-box" id="auth-box">
  <h2>👾 Космический аккаунт</h2>
  <div id="auth-form">
    <input type="text" id="login-username" placeholder="Логин">
    <input type="password" id="login-password" placeholder="Пароль">
    <input type="email" id="login-email" placeholder="Email (для связи)">
    <button onclick="login()">ВОЙТИ</button>
    <button onclick="register()">РЕГИСТРАЦИЯ</button>
    <p id="auth-msg"></p>
  </div>
  <div id="user-panel" class="hidden">
    <p id="welcome-msg"></p>
    <button id="reg-tour-btn" onclick="submitReg()">ПОДАТЬ ЗАЯВКУ НА ТУРНИР</button>
    <button onclick="showNotifications()">УВЕДОМЛЕНИЯ</button>
    <button onclick="logout()">ВЫЙТИ</button>
  </div>
</div>

<!-- Лента новостей -->
<div class="retro-box">
  <h2>📡 НОВОСТИ</h2>
  <div id="news-container">Загрузка...</div>
</div>

<!-- Блок уведомлений (скрыт до вызова) -->
<div class="retro-box hidden" id="notifications-box">
  <h2>🔔 Мои уведомления</h2>
  <div id="notifications-content"></div>
  <button onclick="hideNotifications()">ЗАКРЫТЬ</button>
</div>

<script src="api.js"></script>
<script src="main.js"></script>
</body>
</html>
